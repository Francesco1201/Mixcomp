<div class="font-['JetBrains_Mono'] flex items-center justify-center gap-3 px-4 py-3">


  <button (click)="playA.emit()"
    [disabled]="!hasA"
    [ngClass]="isPlayingA ? 'border-green-400 bg-slate-900 text-green-400 shadow-[0_0_15px_rgba(74,222,128,0.3)]' : !hasA ? 'border-slate-800 bg-slate-950 text-slate-600 opacity-30 cursor-not-allowed' : 'border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700'"
    class="flex items-center justify-center w-12 h-12 border transition-all duration-200 active:scale-95 focus:outline-none"
    title="Play / Pause A">
    <span class="text-sm font-bold tracking-widest">{{ isPlayingA ? '■' : 'A' }}</span>
  </button>


  <button (click)="playB.emit()"
    [disabled]="!hasB"
    [ngClass]="isPlayingB ? 'border-blue-400 bg-slate-900 text-blue-400 shadow-[0_0_15px_rgba(96,165,250,0.3)]' : !hasB ? 'border-slate-800 bg-slate-950 text-slate-600 opacity-30 cursor-not-allowed' : 'border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700'"
    class="flex items-center justify-center w-12 h-12 border transition-all duration-200 active:scale-95 focus:outline-none"
    title="Play / Pause B">
    <span class="text-sm font-bold tracking-widest">{{ isPlayingB ? '■' : 'B' }}</span>
  </button>

  <div class="w-px h-10 bg-slate-800 mx-1"></div>

  <button (click)="rewind.emit()" [disabled]="!hasAny"
    class="flex items-center justify-center w-12 h-12 border border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700 transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Rewind">
    <span class="text-sm font-bold tracking-widest">◀◀</span>
  </button>

  <button (click)="stop.emit()" [disabled]="!hasAny"
    class="flex items-center justify-center w-12 h-12 border border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700 transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Stop">
    <span class="text-sm font-bold tracking-widest">■</span>
  </button>

  <button (click)="playBoth.emit()" [disabled]="!canAct"
    class="flex items-center justify-center w-12 h-12 border border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700 transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Play both">
    <span class="text-sm font-bold tracking-widest">A+B</span>
  </button>

  <button (click)="switchAB.emit()" [disabled]="!canAct"
    class="flex items-center justify-center w-12 h-12 border border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700 transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Switch A→B">
    <span class="text-sm font-bold tracking-widest">A/B</span>
  </button>

  <button (click)="normalize.emit()" [disabled]="!canAct"
    [ngClass]="isNormalized ? 'border-orange-400 bg-slate-900 text-orange-400 shadow-[0_0_15px_rgba(251,146,60,0.3)]' : 'border-slate-800 bg-slate-950 text-slate-400 hover:text-slate-200 hover:border-slate-700'"
    class="flex items-center justify-center w-12 h-12 border transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Normalize LUFS">
    <span class="text-sm font-bold tracking-widest">LU</span>
  </button>

  <div class="w-px h-10 bg-slate-800 mx-1"></div>

  <button (click)="reset.emit()" [disabled]="!hasAny"
    class="flex items-center justify-center w-12 h-12 border border-slate-800 bg-slate-950 text-slate-400 hover:text-red-400 hover:border-red-900 transition-all duration-200 active:scale-95 focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed"
    title="Reset">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
      <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd" />
    </svg>
  </button>

</div>
