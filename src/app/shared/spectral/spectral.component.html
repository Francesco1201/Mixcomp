<h2 class="font-bold">SPECTRUM VISUALIZER</h2>
<div class="flex gap-4 items-center mb-2 flex-wrap">
  <label class="flex items-center gap-2 text-xs text-slate-400 font-mono">
    <input class="accent-[#ffb900]" type="checkbox" [(ngModel)]="logScale" (change)="onSettingChange()">
    LOG SCALE
  </label>
  <label class="flex items-center gap-2 text-xs text-slate-400 font-mono">
    dB MIN
    <input class="accent-[#ffb900]" type="range" min="-120" max="-40" step="6" [(ngModel)]="dbMin" (change)="onSettingChange()">
    <span>{{ dbMin }}</span>
  </label>
  <label class="flex items-center gap-2 text-xs text-slate-400 font-mono">
    SMOOTH
    <input class="accent-[#ffb900]" type="range" min="0" max="0.95" step="0.05" [(ngModel)]="smoothing" (change)="onSettingChange()">
    <span>{{ smoothing }}</span>
  </label>
</div>
<canvas #spectralCanvas></canvas>
